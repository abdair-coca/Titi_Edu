name: CI

# Gate de calidad: cada PR (y push) a main corre lint + tests del backend y
# build del frontend. Si algo rompe, el check falla y —con branch protection—
# el merge se bloquea.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Genera el cliente Prisma (los tests lo mockean, pero generarlo evita
      # sorpresas si algún import lo carga). No necesita una DB real.
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test
        env:
          JWT_SECRET: ci-test-secret

  frontend:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
